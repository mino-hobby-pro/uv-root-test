<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mino-music | おすすめ音楽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #ffffff; }
        .music-card { transition: transform 0.2s; }
        .music-card:hover { transform: scale(1.02); background-color: #1e1e1e; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold text-red-500 mb-2">mino-music</h1>
            <p class="text-gray-400">Last.fm APIによる今週のおすすめトラック</p>
        </header>

        <div id="loader" class="text-center text-xl">読み込み中...</div>
        
        <div id="music-list" class="grid gap-4">
            </div>
    </div>

    <script>
        async function fetchMusic() {
            try {
                const response = await fetch('/api/recommendations');
                const data = await response.json();
                const tracks = data.tracks.track;

                const listElement = document.getElementById('music-list');
                const loader = document.getElementById('loader');
                
                loader.style.display = 'none';

                listElement.innerHTML = tracks.map((track, index) => `
                    <div class="music-card p-4 rounded-lg border border-gray-800 flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <span class="text-2xl font-bold text-gray-700 w-8">${index + 1}</span>
                            <div>
                                <h3 class="font-bold text-lg">${track.name}</h3>
                                <p class="text-gray-400">${track.artist.name}</p>
                            </div>
                        </div>
                        <a href="${track.url}" target="_blank" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-full text-sm transition">
                            Listen on Last.fm
                        </a>
                    </div>
                `).join('');

            } catch (error) {
                document.getElementById('loader').innerText = 'データの取得に失敗しました。';
                console.error(error);
            }
        }

        fetchMusic();
    </script>
</body>
</html>
